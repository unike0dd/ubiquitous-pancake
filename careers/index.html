<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Apply to join Gabriel Services across logistics, admin, customer relations, and IT support workflows." />
    <link rel="canonical" href="https://unike0dd.github.io/ubiquitous-pancake/careers/" />
    <title>Careers | Gabriel Services</title>
    <meta property="og:title" content="Careers | Gabriel Services" />
    <meta property="og:url" content="https://unike0dd.github.io/ubiquitous-pancake/careers/" />
    <meta name="twitter:title" content="Careers | Gabriel Services" />
    <style>
      body { font-family: Inter, system-ui, sans-serif; margin: 0; background: #f8fafc; color: #0f172a; }
      .page { max-width: 980px; margin: 0 auto; padding: 24px; }
      .site-header { display:flex; flex-wrap:wrap; gap:12px; justify-content:space-between; align-items:center; }
      .site-nav { display:flex; gap:10px; flex-wrap:wrap; }
      .site-nav a { color:#0f172a; text-decoration:none; padding:6px 10px; border-radius:8px; }
      .site-nav a.active { background:#e2e8f0; font-weight:600; }
      h1 { margin: 18px 0 6px; }
      .lead { margin:0 0 20px; color:#334155; }
      form { display:grid; gap:12px; }
      input, select, textarea { width:100%; box-sizing:border-box; padding:10px 12px; border:1px solid #cbd5e1; border-radius:8px; font:inherit; }
      textarea { min-height:120px; resize:vertical; }
      .btn-row { display:flex; gap:10px; flex-wrap:wrap; }
      button { padding:10px 14px; border:1px solid #94a3b8; border-radius:8px; background:#fff; cursor:pointer; }
      .inline-note { color:#475569; font-size:.95rem; }
    </style>
      <link rel="stylesheet" href="/ubiquitous-pancake/styles/main.css" />
      <link rel="stylesheet" href="/ubiquitous-pancake/styles/responsive-desktop.css" />
      <link rel="stylesheet" href="/ubiquitous-pancake/styles/responsive-mobile-tablet.css" />
      <script>
      if (window.location.hash === "#") {
        history.replaceState(null, "", window.location.pathname + window.location.search);
      }
    </script>
  </head>
  <body>
    <div class="page">
      <header class="site-header">
        <strong>Gabriel Services</strong>
        <nav class="site-nav" aria-label="Primary">
          <a href="/ubiquitous-pancake/about/">About</a>
          <a class="active" href="/ubiquitous-pancake/careers/">Careers</a>
          <a href="/ubiquitous-pancake/contact/">Contact</a>
          <a href="/ubiquitous-pancake/learning/">Learning</a>
        </nav>
      </header>

      <h1>Careers</h1>
      <p class="lead">Apply to support operations, communication, and service delivery workflows across all service domains.</p>

      <form>
        <input placeholder="Full Name" />
        <input placeholder="Email Address" />
        <input placeholder="Country Code" />
        <input placeholder="Contact Number" />
        <input placeholder="City" />
        <input placeholder="State/Province" />
        <input placeholder="Country Zip Code" />
        <input placeholder="Availability" />
        <select>
          <option>Area of Interest (Logistics / Admin / Customer Relations / IT Support)</option>
          <option>Logistics</option>
          <option>Admin</option>
          <option>Customer Relations</option>
          <option>IT Support</option>
        </select>
        <input placeholder="Resume/Profile link" />
        <select>
          <option>Education Level</option>
          <option>High School</option>
          <option>Associate</option>
          <option>Bachelor</option>
          <option>Master</option>
          <option>Doctorate</option>
          <option>Certified</option>
        </select>
        <input placeholder="Experience Level" />
        <p class="inline-note">Add + Remove -</p>
        <input placeholder="Languages" />
        <p class="inline-note">Add + Remove -</p>
        <input placeholder="Skills" />
        <p class="inline-note">Add + Remove -</p>
        <input placeholder="Projects" />
        <p class="inline-note">Add + Remove -</p>
        <input placeholder="Education" />
        <p class="inline-note">Add + Remove -</p>
        <input placeholder="Best Time to Contact You" />
        <textarea placeholder="Message"></textarea>
        <div class="btn-row">
          <button type="button">Submit Application</button>
          <button type="reset">Clear Form</button>
        </div>
      </form>
    </div>
    <script src="/ubiquitous-pancake/scripts/desktop-core.js"></script>
    <script src="/ubiquitous-pancake/scripts/mobile-tablet-core.js"></script>
    <script src="/ubiquitous-pancake/scripts/i18n.js"></script>
  </body>
</html>
