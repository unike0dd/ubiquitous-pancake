<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gabriel Services | Careers Form Sample</title>
<style>body{font-family:Inter,"Segoe UI",Arial,sans-serif;margin:0;background:#f6f7fb;color:#101828}.container{width:min(100% - 32px,1120px);margin:0 auto}.site-header{position:sticky;top:0;border-bottom:1px solid #d0d5dd;background:#ffffffdd;backdrop-filter:blur(10px)}.nav-wrap{min-height:72px;display:flex;justify-content:space-between;align-items:center}.nav-links{display:flex;list-style:none;gap:10px;padding:0}.nav-links a{padding:8px 12px;border-radius:999px;text-decoration:none;color:#667085}.nav-links a[aria-current="page"],.nav-links a:hover{background:#111;color:#fff}.page-main{padding:40px 0}.careers-hero{text-align:center;margin-bottom:24px}.panel{border:1px solid #d0d5dd;border-radius:20px;background:#fff;box-shadow:0 12px 30px rgba(16,24,40,.08)}.panel__body{padding:24px}.site-form{display:grid;gap:22px}.grid{display:grid;gap:14px}.grid--2{grid-template-columns:repeat(2,minmax(0,1fr))}.field{display:grid;gap:8px}label{font-weight:700}input,select,textarea{width:100%;padding:12px;border:1px solid #d0d5dd;border-radius:12px}.check-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.check-card{display:flex;gap:10px;align-items:center;border:1px solid #d0d5dd;border-radius:12px;padding:10px}.dynamic__entry{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px}.dynamic__entry--triple{grid-template-columns:minmax(0,1fr) minmax(140px,220px) auto}.pill-list{display:flex;flex-wrap:wrap;gap:8px;list-style:none;padding:0;margin:0}.pill{display:inline-flex;gap:8px;align-items:center;background:#f3f4f6;border:1px solid #d0d5dd;border-radius:999px;padding:8px 12px}.pill button{border:0;background:#fff;border-radius:50%;width:24px;height:24px}.secure-actions{display:flex;gap:10px;flex-wrap:wrap}.btn{padding:12px 18px;border-radius:999px;border:1px solid #d0d5dd;cursor:pointer}.btn--primary{background:#111;color:#fff;border-color:#111}.status-note{min-height:22px}.status-note[data-state="success"]{color:#067647}.status-note[data-state="blocked"]{color:#b42318}.status-note[data-state="review"]{color:#b54708}.sr-only{position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden}@media(max-width:820px){.grid--2,.check-grid,.dynamic__entry,.dynamic__entry--triple{grid-template-columns:1fr}}</style>
</head>
<body>
<header class="site-header"><div class="container nav-wrap"><a><strong>Gabriel Services</strong></a><nav><ul class="nav-links"><li><a href="#">Home</a></li><li><a href="#">About</a></li><li><a href="#">Services</a></li><li><a href="#" aria-current="page">Careers</a></li><li><a href="#">Contact</a></li></ul></nav></div></header>
<main class="container page-main"><section class="careers-hero"><h1>Careers</h1><p>We are hiring across logistics, administrative back office, customer relations, and IT support service domains.</p></section>
<div class="panel"><div class="panel__body"><form id="careersForm" class="site-form" novalidate>
<div class="grid grid--2">
<div class="field"><label for="careerFullName">Full Name</label><input id="careerFullName" name="full_name" required></div>
<div class="field"><label for="careerEmail">Email Address</label><input id="careerEmail" name="email_address" type="email" required></div>
<div class="field"><label for="careerCountryCode">Country Code</label><input id="careerCountryCode" name="country_code" required></div>
<div class="field"><label for="careerNumber">Contact Number</label><input id="careerNumber" name="contact_number" required></div>
<div class="field"><label for="careerCity">City</label><input id="careerCity" name="city" required></div>
<div class="field"><label for="careerState">State/Province</label><input id="careerState" name="state_province" required></div>
<div class="field"><label for="careerZip">Country Zip Code</label><input id="careerZip" name="country_zip_code" required></div>
<div class="field"><label for="careerAvailability">Availability</label><input id="careerAvailability" type="datetime-local" name="availability" required></div>
<div class="field"><label for="careerBestTime">Best Time to Contact You</label><input id="careerBestTime" type="datetime-local" name="best_time_to_contact"></div>
<div class="field"><label for="careerLinkedInUrl">Linked In Profile URL</label><input id="careerLinkedInUrl" type="url" name="linkedin_profile_url"></div>
</div>
<section><h4>Area of Interest</h4><div class="check-grid"><label class="check-card"><input type="checkbox" name="career_interest[]" value="Logistics Operations"><span>Logistics Operations</span></label><label class="check-card"><input type="checkbox" name="career_interest[]" value="Administrative Back Office"><span>Administrative Back Office</span></label><label class="check-card"><input type="checkbox" name="career_interest[]" value="Customer Relations"><span>Customer Relations</span></label><label class="check-card"><input type="checkbox" name="career_interest[]" value="IT Support"><span>IT Support</span></label></div></section>
<section><h4>Experience and Profile</h4>
<div class="field"><label for="careerExperienceInput">Experience Level</label><div class="dynamic__entry dynamic__entry--triple"><input id="careerExperienceInput"><select id="careerExperienceLevel"><option value="">Select level</option><option>Entry</option><option>Junior</option><option>Mid</option><option>Advanced</option><option>Expert</option></select><button type="button" id="careerExperienceAdd" class="btn">Add</button></div><ul id="careerExperienceList" class="pill-list"></ul><input type="hidden" id="careerExperienceHidden" name="experience_items"></div>
<div class="field"><label for="careerMessage">Message</label><textarea id="careerMessage" name="message"></textarea></div></section>
<div class="secure-actions"><button class="btn btn--primary" type="submit">Submit Application</button><button class="btn" type="button" id="clearCareerFormBtn">Clear Form</button></div>
<div class="sr-only"><input id="careerPortfolioUrl" name="portfolio_url" type="text" tabindex="-1" autocomplete="off"></div><p id="careerFormStatus" class="status-note"></p>
</form></div></div></main>
<script>
(function(){const form=document.getElementById('careersForm');const status=document.getElementById('careerFormStatus');const input=document.getElementById('careerExperienceInput');const level=document.getElementById('careerExperienceLevel');const list=document.getElementById('careerExperienceList');const hidden=document.getElementById('careerExperienceHidden');function setStatus(m,s){status.textContent=m||'';status.dataset.state=s||''}function values(){return [...list.querySelectorAll('.pill')].map(p=>p.dataset.value).filter(Boolean)}function sync(){hidden.value=JSON.stringify(values())}function add(){const t=(input.value||'').trim();const l=(level.value||'').trim();if(!t||!l){setStatus('Please type a value and select a level before adding.','blocked');return}const v=t+' — '+l;if(values().some(x=>x.toLowerCase()===v.toLowerCase())){setStatus('That item is already added.','blocked');return}const li=document.createElement('li');li.className='pill';li.dataset.value=v;li.innerHTML='<span>'+v+'</span>';const b=document.createElement('button');b.type='button';b.textContent='×';b.onclick=()=>{li.remove();sync();setStatus('Removed item.','success')};li.appendChild(b);list.appendChild(li);sync();input.value='';level.value='';setStatus('Added: '+v,'success')}document.getElementById('careerExperienceAdd').addEventListener('click',add);document.getElementById('clearCareerFormBtn').addEventListener('click',()=>{form.reset();list.innerHTML='';sync();setStatus('Career application form cleared.','success')});form.addEventListener('submit',e=>{e.preventDefault();if(document.getElementById('careerPortfolioUrl').value.trim()){setStatus('Submission blocked.','blocked');return}if(!form.checkValidity()){form.reportValidity();setStatus('Please complete all required application fields.','blocked');return}if(!form.querySelector('input[name="career_interest[]"]:checked')){setStatus('Please select at least one career area of interest.','blocked');return}setStatus('Scanning and sanitizing your application...','review');const payload=Object.fromEntries(new FormData(form).entries());console.log('Career application sample payload:',payload);setTimeout(()=>setStatus('Sample ready. Payload printed in the browser console. No Worker request was sent.','success'),500)});})();
</script>
</body>
</html>
