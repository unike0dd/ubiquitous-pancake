<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Gabriel Services</title>
    <style>
      body { font-family: Inter, system-ui, sans-serif; margin: 0; background: #f8fafc; color: #0f172a; }
      .page { max-width: 980px; margin: 0 auto; padding: 24px; }
      .site-header { display:flex; flex-wrap:wrap; gap:12px; justify-content:space-between; align-items:center; }
      .site-nav { display:flex; gap:10px; flex-wrap:wrap; }
      .site-nav a { color:#0f172a; text-decoration:none; padding:6px 10px; border-radius:8px; }
      .site-nav a.active { background:#e2e8f0; font-weight:600; }
      h1 { margin: 18px 0 6px; }
      .lead { margin:0 0 20px; color:#334155; }
      form { display:grid; gap:12px; }
      input, textarea { width:100%; box-sizing:border-box; padding:10px 12px; border:1px solid #cbd5e1; border-radius:8px; font:inherit; }
      textarea { min-height:120px; resize:vertical; }
      .btn-row { display:flex; gap:10px; flex-wrap:wrap; }
      button { padding:10px 14px; border:1px solid #94a3b8; border-radius:8px; background:#fff; cursor:pointer; }
      h3 { margin-top: 12px; margin-bottom: 0; }
      .inline-note { color:#475569; font-size:.95rem; }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="site-header">
        <strong>Gabriel Services</strong>
        <nav class="site-nav" aria-label="Primary">
          <a href="/ubiquitous-pancake/about/">About</a>
          <a href="/ubiquitous-pancake/careers/">Careers</a>
          <a class="active" href="/ubiquitous-pancake/contact/">Contact</a>
          <a href="/ubiquitous-pancake/learning/">Learning</a>
        </nav>
      </header>

      <h1>Contact</h1>
      <p class="lead">Get in touch for support, onboarding, projects, and partnership opportunities.</p>

      <form>
        <input placeholder="Full Name" />
        <input placeholder="Email Address" />
        <input placeholder="Country Code" />
        <input placeholder="Contact Number" />
        <input placeholder="City" />
        <input placeholder="State/Province" />
        <input placeholder="Space/Suite/Apt" />
        <input placeholder="Country Zip Code" />
        <input placeholder="Best Time to Contact You" />
        <textarea placeholder="Message"></textarea>
        <h3>Inquiry About Remote Assistant</h3>
        <input placeholder="Skills" />
        <p class="inline-note">Add + Remove -</p>
        <input placeholder="Area of Interest" />
        <p class="inline-note">Add + Remove -</p>
        <input placeholder="Experience Level" />
        <p class="inline-note">Add + Remove -</p>
        <input placeholder="Education" />
        <p class="inline-note">Add + Remove -</p>
        <input placeholder="Languages" />
        <p class="inline-note">Add + Remove -</p>
        <div class="btn-row">
          <button type="button">Submit</button>
          <button type="reset">Clear Form</button>
        </div>
      </form>
    </div>
  </body>
</html>
