<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Gabriel Services — Chattia Applied Sample</title>

  <style>
    :root {
      --mouse-x: 50vw;
      --mouse-y: 50vh;

      --bg: #050505;
      --bg-2: #0b0907;
      --surface: rgba(11, 18, 30, 0.9);
      --surface-strong: rgba(14, 23, 38, 0.98);
      --surface-soft: rgba(15, 24, 42, 0.76);

      --text: #f3f6fc;
      --text-strong: #ffffff;
      --text-soft: #c9d1df;
      --muted: #a8b1c2;

      --navy: #173f78;
      --navy-2: #245294;

      --purple: #6d35a5;
      --purple-soft: rgba(109, 53, 165, 0.16);

      --gold: #c79b52;
      --gold-2: #ead093;
      --gold-soft: rgba(199, 155, 82, 0.14);

      --cyan: #00c4ff;
      --pink: #ff3bdb;

      --line: rgba(234, 208, 147, 0.16);
      --line-strong: rgba(234, 208, 147, 0.36);

      --radius-xl: 32px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --radius-pill: 999px;

      --shadow-soft: 0 18px 50px rgba(0, 0, 0, 0.28);
      --shadow-strong: 0 28px 80px rgba(0, 0, 0, 0.44);

      --ease: 180ms ease;
      --max: 1180px;
      --reading: 760px;
    }

    html[data-theme="light"] {
      color-scheme: light;

      --bg: #f6f0e5;
      --bg-2: #eee3d2;
      --surface: rgba(255, 255, 255, 0.9);
      --surface-strong: rgba(255, 255, 255, 0.98);
      --surface-soft: rgba(255, 255, 255, 0.78);

      --text: #1b1830;
      --text-strong: #0f1320;
      --text-soft: #3d4660;
      --muted: #606a80;

      --purple: #4b1d73;
      --purple-soft: rgba(75, 29, 115, 0.12);

      --line: rgba(75, 29, 115, 0.14);
      --line-strong: rgba(75, 29, 115, 0.3);

      --shadow-soft: 0 18px 42px rgba(38, 25, 58, 0.1);
      --shadow-strong: 0 28px 70px rgba(38, 25, 58, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      font-family:
        Inter,
        ui-sans-serif,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 8%, var(--purple-soft), transparent 28rem),
        radial-gradient(circle at 94% 2%, var(--gold-soft), transparent 28rem),
        linear-gradient(180deg, var(--bg), var(--bg-2));
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      transition:
        background 220ms ease,
        color 220ms ease;
    }

    body.theme-dark::before { content:""; position:fixed; inset:0; z-index:0; pointer-events:none; background-image: radial-gradient(circle, rgba(199, 155, 82, 0.14) 1px, transparent 1.45px); background-size:18px 18px; opacity:.3; }
    body.theme-dark::after { content:""; position:fixed; inset:0; z-index:0; pointer-events:none; opacity:0; background-image: radial-gradient(circle, rgba(234, 208, 147, 0.38) 1px, transparent 1.8px), radial-gradient(circle, rgba(109, 53, 165, 0.12) 1.6px, transparent 2.8px); background-size:18px 18px, 32px 32px; -webkit-mask-image: radial-gradient(circle 170px at var(--mouse-x) var(--mouse-y), black 0%, black 30%, transparent 74%); mask-image: radial-gradient(circle 170px at var(--mouse-x) var(--mouse-y), black 0%, black 30%, transparent 74%); filter: drop-shadow(0 0 1px rgba(234, 208, 147, 0.22)) drop-shadow(0 0 5px rgba(199, 155, 82, 0.12)); transition:opacity 160ms ease; }
    body.theme-dark.mouse-active::after { opacity: .56; }
    body.chat-open { overflow: hidden; }
    a { color: inherit; text-decoration:none; } button,input,textarea { font:inherit; } button{-webkit-tap-highlight-color:transparent;}
    .site-shell { position:relative; z-index:1; width:min(var(--max), calc(100% - 32px)); margin:0 auto; padding:22px 0 96px; }
    .site-header { position:sticky; top:14px; z-index:30; display:flex; align-items:center; justify-content:space-between; gap:16px; padding:14px 18px; border:1px solid var(--line); border-radius:var(--radius-pill); background:linear-gradient(180deg, rgba(23, 63, 120, 0.96), rgba(23, 63, 120, 0.88)); box-shadow:var(--shadow-soft); backdrop-filter:blur(18px); }
    .brand { display:grid; gap:2px; min-width:0; }
    .brand strong{ color:#fff; font-size:1.02rem; font-weight:950; letter-spacing:-.04em; line-height:1.1;} .brand span{ color:rgba(255,255,255,.84); font-size:.64rem; font-weight:950; letter-spacing:.18em; text-transform:uppercase; line-height:1.1;}
    .desktop-nav{display:flex;align-items:center;gap:10px;} .desktop-tools{display:flex;align-items:center;gap:8px;padding-left:4px;margin-left:2px;border-left:1px solid rgba(255,255,255,.14);}
    .nav-btn,.desktop-tool-btn{appearance:none;border:1px solid rgba(255,255,255,.12);border-radius:var(--radius-pill);background:rgba(255,255,255,.08);color:rgba(255,255,255,.88);padding:11px 16px;font-size:.92rem;font-weight:850;cursor:pointer;white-space:nowrap;transition:transform var(--ease),border-color var(--ease),background var(--ease),color var(--ease);} 
    .desktop-tool-btn{min-width:68px;text-align:center;color:var(--gold-2);background:linear-gradient(135deg, rgba(199, 155, 82, 0.14), rgba(255, 255, 255, 0.06));}
    .nav-btn:hover,.nav-btn:focus-visible,.nav-btn.is-active,.desktop-tool-btn:hover,.desktop-tool-btn:focus-visible{transform:translateY(-1px);border-color:rgba(234,208,147,.46);background:rgba(255,255,255,.15);color:#fff;outline:none;}
    .desktop-services-wrap{position:relative;} .desktop-services-menu{position:absolute;top:calc(100% + 12px);right:0;width:min(360px,82vw);z-index:45;}
    .popup-card{border:1px solid var(--line-strong);border-radius:var(--radius-lg);background:radial-gradient(circle at top right,var(--gold-soft),transparent 48%),linear-gradient(180deg,var(--surface-strong),var(--surface));box-shadow:var(--shadow-strong);padding:14px;overflow:hidden;backdrop-filter:blur(22px);} .popup-title{color:var(--text-strong);font-size:.82rem;font-weight:950;letter-spacing:.14em;text-transform:uppercase;margin:0 0 12px;} .popup-list{display:grid;gap:8px;}
    .service-option{appearance:none;width:100%;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.035);color:var(--text);padding:12px 14px;text-align:left;font-weight:850;cursor:pointer;transition:transform var(--ease),border-color var(--ease),background var(--ease),color var(--ease);} .service-option:hover,.service-option:focus-visible{transform:translateX(4px);border-color:var(--line-strong);background:linear-gradient(135deg,var(--purple-soft),rgba(255,255,255,.05));color:var(--text-strong);outline:none;}
    .app-content{padding-top:30px;} .hero{display:grid;grid-template-columns:minmax(0,1.08fr) minmax(300px,.72fr);gap:clamp(28px,5vw,64px);align-items:center;min-height:64vh;} .eyebrow{margin:0 0 18px;color:var(--gold);font-size:.78rem;font-weight:950;letter-spacing:.16em;text-transform:uppercase;} h1{max-width:12ch;margin:0;color:var(--text-strong);font-size:clamp(3rem,8vw,6.2rem);line-height:.94;letter-spacing:-.08em;} h2{margin:0;color:var(--text-strong);font-size:clamp(2rem,4.8vw,3.8rem);line-height:1;letter-spacing:-.06em;} h3,p{margin:0;}
  </style>
</head>
<body class="theme-dark"><main>Sample provided by user applied.</main></body></html>
